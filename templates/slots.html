{% extends "base.html" %}
{% block content %}
<h2>{{ establishment }} Parking Slots</h2>
<div class="parking-lot">
  {% for row_number, left, right in rows %}
    <div class="parking-row">
      <a class="slot" href="{{ url_for('select_slot', est=establishment, slot=left) }}">{{ left }}</a>
      <div class="lane-divider">Row {{ row_number }}</div>
      <a class="slot" href="{{ url_for('select_slot', est=establishment, slot=right) }}">{{ right }}</a>
    </div>
  {% endfor %}
</div>
{% endblock %}
